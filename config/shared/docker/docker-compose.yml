services:
  # ============================================================================
  # PostgreSQL Database for JEEERAaH Application
  # Main application database - hosts both 'jeeeraaah' and 'lib_test' databases
  # Uses credentials from .env: postgres_jeeeraaah_* and postgres_lib_test_*
  # ============================================================================
  postgres-jeeeraaah:
    image: postgres:16-alpine
    container_name: postgres-jeeeraaah
    environment:
      # Primary database configuration from .env (POSTGRES_JEEERAAAH_*)
      POSTGRES_DB: ${POSTGRES_JEEERAAAH_DATABASE}
      POSTGRES_USER: ${POSTGRES_JEEERAAAH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_JEEERAAAH_PASSWORD}
      # Additional database credentials passed to init scripts (POSTGRES_LIB_TEST_*)
      LIB_TEST_DB: ${POSTGRES_LIB_TEST_DATABASE}
      LIB_TEST_USER: ${POSTGRES_LIB_TEST_USER}
      LIB_TEST_PASSWORD: ${POSTGRES_LIB_TEST_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-jeeeraaah-data:/var/lib/postgresql/data
      - postgres-jeeeraaah-backups:/backups
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ./postgres-entrypoint-wrapper.sh:/usr/local/bin/postgres-entrypoint-wrapper.sh:ro
      - ./healthcheck/postgres-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/postgres-entrypoint-wrapper.sh"]
    command: ["postgres"]
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ============================================================================
  # PostgreSQL Database for Keycloak
  # Dedicated database instance for Keycloak identity management
  # Uses credentials from .env: postgres_keycloak_*
  # Exposed on host port 5433 to avoid conflict with postgres-jeeeraaah
  # ============================================================================
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    environment:
      # Database configuration from .env (POSTGRES_KEYCLOAK_*)
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DATABASE}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
    ports:
      - "5433:5432"  # External port 5433, internal PostgreSQL default 5432
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
      - postgres-keycloak-backups:/backups
      - ./initdb/keycloak:/docker-entrypoint-initdb.d:ro
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USER} -d ${POSTGRES_KEYCLOAK_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ============================================================================
  # Keycloak - Identity and Access Management
  # Provides authentication and authorization services
  # Uses credentials from .env: keycloak_admin_* and postgres_keycloak_*
  # Admin console: http://localhost:8080/admin
  # ============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      # Admin credentials from .env (KEYCLOAK_ADMIN_*)
      # Used to access Keycloak Admin Console
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Database configuration - connects to postgres-keycloak container
      # Uses POSTGRES_KEYCLOAK_* credentials from .env
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DATABASE}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}

      # Server configuration for development mode
      KC_HOSTNAME_STRICT: "false"           # Allow non-strict hostname checking
      KC_HTTP_ENABLED: "true"               # Enable HTTP (not just HTTPS)
      KC_PROXY: edge                        # Trust proxy headers
      KC_HEALTH_ENABLED: "true"             # Enable health endpoints
      KC_METRICS_ENABLED: "true"            # Enable metrics endpoints
    ports:
      - "8080:8080"
    volumes:
      # Keycloak data directory for theme/realm configuration persistence
      - keycloak-data:/opt/keycloak/data
      # Healthcheck script
      - ./healthcheck/keycloak-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
    command: start-dev
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always

  # ============================================================================
  # JasperReports Service - Report Generation
  # Provides REST API for generating reports from JRXML templates
  # Templates are mounted from host filesystem (read-only)
  # Generated reports are stored in Docker volume
  # API: http://localhost:8090
  # ============================================================================
  jasperreports:
    build:
      context: ../../..
      dockerfile: root/lib/office/word/jasperreports/Dockerfile
    container_name: jasperreports
    ports:
      - "8090:8090"
    volumes:
      # Templates directory (read-only) - contains JRXML report templates
      - ../../../root/sandbox/office/microsoft/word/jasperreports/templates:/app/templates:ro
      # Output directory for generated reports (DOCX, PDF, etc.)
      - jasperreports-output:/app/output
    environment:
      - PORT=8090                           # HTTP server port
      - JAVA_OPTS=-Xmx512m                  # JVM memory limit
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

networks:
  ruu-network:
    driver: bridge
    name: ruu-network

volumes:
  # ============================================================================
  # Persistent Volumes for PostgreSQL Databases
  # ============================================================================

  # JEEERAaH Application Database Volumes
  postgres-jeeeraaah-data:
    name: postgres-jeeeraaah-data          # Database files for jeeeraaah and lib_test
  postgres-jeeeraaah-backups:
    name: postgres-jeeeraaah-backups       # Backup storage for jeeeraaah databases

  # Keycloak Database Volumes
  postgres-keycloak-data:
    name: postgres-keycloak-data           # Database files for keycloak
  postgres-keycloak-backups:
    name: postgres-keycloak-backups        # Backup storage for keycloak database

  # Keycloak Application Data
  keycloak-data:
    name: keycloak-data                    # Keycloak themes, realms, and configuration

  # JasperReports Generated Output
  jasperreports-output:
    name: jasperreports-output             # Generated DOCX, PDF reports

# ═══════════════════════════════════════════════════════════════════
# Hinweise
# ═══════════════════════════════════════════════════════════════════
#
# CREDENTIALS:
# Alle Credentials werden aus der .env Datei geladen!
# Siehe: .env.template für die Struktur
#
# PostgreSQL JEEERAaH (Port 5432):
#   Database: ${POSTGRES_JEEERAAAH_DB}
#   User:     ${POSTGRES_JEEERAAAH_USER}
#   Password: ${POSTGRES_JEEERAAAH_PASSWORD}
#
# PostgreSQL Keycloak (Port 5433):
#   Database: ${POSTGRES_KEYCLOAK_DB}
#   User:     ${POSTGRES_KEYCLOAK_USER}
#   Password: ${POSTGRES_KEYCLOAK_PASSWORD}
#
# Keycloak Admin Console (http://localhost:8080/admin):
#   Username: ${KC_BOOTSTRAP_ADMIN_USERNAME}
#   Password: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
#
# Init-Skripte:
#   JEEERAaH: Lege SQL in ./initdb/ ab
#   Keycloak: Lege SQL in ./initdb/keycloak/ ab
#   Ausführung beim ersten Start automatisch (alphabetisch sortiert)
#
# Rebuild (Daten löschen):
#   docker compose down -v
#   docker volume rm postgres-jeeeraaah-data postgres-keycloak-data keycloak-data
#   docker compose up -d
#
# Einzelnen Container neu starten:
#   docker compose restart <container-name>


# ============================================================================
# MicroProfile Config for Frontend API Client Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# REST API Connection Configuration
jeeeraaah.rest-api.host=${rest.api.host}
jeeeraaah.rest-api.port=${rest.api.port}

# Override base path for tests if needed
# Leave empty to use just scheme://host:port without /jeeeraaah prefix
jeeeraaah.rest-api.context-root=/jeeeraaah


# ============================================================================
# REST API Client Configuration
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# REST API Client Configuration
#
# This configuration is used by JavaFX clients to connect to the backend server.
#
# WSL2 Development Setup:
# - Use 'localhost' as host (works in WSL2 and from Windows via port forwarding)
# - Server must be configured with default_host_name=* to accept connections
#
# Alternative configurations:
# - Use WSL2 IP (e.g., 172.26.x.x) - changes after WSL2 restart!
# - Use 127.0.0.1 - only works within WSL2, not from Windows
#
# Default values - can be overridden via System properties or environment variables
rest.api.host=localhost
rest.api.port=9080

jeeeraaah.rest-api.scheme=http
jeeeraaah.rest-api.host=${rest.api.host}
jeeeraaah.rest-api.port=${rest.api.port}

# Keycloak Authentication Configuration (Frontend)
#
# Diese Konfiguration wird vom KeycloakAuthService im Frontend verwendet, um sich
# beim Keycloak-Server zu authentifizieren und JWT-Tokens zu erhalten.
#
# Authentifizierungsflow:
# 1. KeycloakAuthService.login(username, password) sendet Credentials an Keycloak
# 2. Keycloak validiert die Credentials und gibt Access Token + Refresh Token zurueck
# 3. Access Token wird in HTTP-Header "Authorization: Bearer <token>" fuer API-Calls verwendet
# 4. Bei 401 Unauthorized wird automatisch refreshAccessToken() aufgerufen
#
# Client-Typ: Public Client (Client authentication: OFF in Keycloak)
# - Keine Client Secret erforderlich, da JavaFX-Clients Secrets nicht sicher speichern koennen
# - Direct Access Grants (Password Grant) muss in Keycloak aktiviert sein
#
# Keycloak-Setup erforderlich:
# 1. Realm erstellen: jeeeraaah-realm
# 2. Client erstellen: jeeeraaah-frontend
#    - Client type: OpenID Connect
#    - Client authentication: OFF (Public Client)
#    - Direct access grants: ON (fuer Resource Owner Password Credentials Grant)
# 3. User anlegen und Passwort setzen
# 4. Rollen zuweisen (z.B. taskgroup-read, task-write)
#
# Security-Hinweis:
# - Password Grant ist fuer Desktop-Apps (JavaFX) akzeptabel
# - Fuer Browser-basierte SPAs sollte Authorization Code Flow mit PKCE verwendet werden
# - Tokens werden nur im Arbeitsspeicher gehalten, niemals persistiert
#
# Token Refresh:
# - Access Tokens sind typischerweise 5-15 Minuten gueltig
# - Refresh Tokens sind 30 Tage gueltig (konfigurierbar in Keycloak)
# - Bei Token-Expiry wird automatisch refreshAccessToken() aufgerufen
# - Bei Refresh-Failure ist Re-Login erforderlich

# Keycloak Server URL (ohne /realms/...)
# Default value - can be overridden via System properties or environment variables
keycloak.host=localhost

# Keycloak Port
# Default value - can be overridden via System properties or environment variables
keycloak.port=8080

# Keycloak Auth Server URL
keycloak.auth.server.url=http://${keycloak.host}:${keycloak.port}

# Realm Name (muss in Keycloak existieren)
# Default value - can be overridden via System properties or environment variables
keycloak.realm=realm_default

# Client ID des Frontend-Clients (Public Client in Keycloak)
# Dieser Client muss in Keycloak im Realm "jeeeraaah-realm" erstellt werden
keycloak.client-id=jeeeraaah-frontend


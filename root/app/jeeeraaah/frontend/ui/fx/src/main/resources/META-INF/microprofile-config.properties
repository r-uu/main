# ============================================================================
# MicroProfile Config for Jeeeraaah Frontend UI FX
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

# Testing configuration
# These values are replaced by Maven during build from config.properties
# Fallback values are used if Maven filtering doesn't work
testing=true
testing.username=${db.username:r_uu}
testing.password=${db.password:r_uu_password}

# Path to the writable config file (optional, for runtime modifications)
config.file.name=testing.properties

# ============================================================================
# MicroProfile Configuration for jeeeraaah Backend REST API
# ============================================================================
# This file contains configuration properties for the backend application,
# particularly for Keycloak integration and JWT authentication.
#
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
#
# Configuration Priority (higher ordinal = higher priority):
# - System properties (ordinal 400)
# - Environment variables (ordinal 300)
# - server.env (ordinal 200)
# - microprofile-config.properties (ordinal 100)
# - server.xml defaults
# ============================================================================

# Configuration ordinal - defines priority of this configuration source
config_ordinal=100

# ============================================================================
# Keycloak / JWT Authentication Configuration
# ============================================================================
# These properties configure the connection to Keycloak for OAuth2/OIDC
# authentication and JWT token validation.
#
# Note: The actual JWT configuration is done in server.xml using the
# mpJwt element. These properties can be used for additional client-side
# Keycloak interactions or custom authentication logic.
# ============================================================================

# Keycloak Realm
# The realm name in Keycloak that contains users, roles, and clients
# for the jeeeraaah application
# Default value - can be overridden via System properties or environment variables
keycloak.realm=jeeeraaah-realm

# Keycloak Host
# Default value - can be overridden via System properties or environment variables
keycloak.host=localhost

# Keycloak Port
# Default value - can be overridden via System properties or environment variables
keycloak.port=8080

# Keycloak Auth Server URL
# Base URL of the Keycloak server
# - Development (Docker): http://localhost:8080
# - Production: Replace with actual domain (e.g., https://auth.example.com)
keycloak.auth-server-url=http://${keycloak.host}:${keycloak.port}

# Keycloak Client ID
# The client identifier for the backend application registered in Keycloak
# Must match the client ID configured in Keycloak and server.xml (audiences)
# Default value - can be overridden via System properties or environment variables
keycloak.client-id=keycloak_client_id

# Keycloak Client Secret
# Confidential client secret from Keycloak (Credentials tab)
#
# RECOMMENDED: Use environment variable instead of hardcoding here!
# The value below is a fallback for development only.
#
# To use environment variable (highest security):
# 1. Add KEYCLOAK_CLIENT_SECRET to config/wsl/docker/.env (template)
# 2. Create config/wsl/docker/.env.local with actual secret (gitignored)
# 3. Load environment before starting Liberty:
#    export $(grep -v '^#' config/wsl/docker/.env.local | xargs)
#
# MicroProfile Config will automatically use the environment variable
# KEYCLOAK_CLIENT_SECRET (ordinal 300) over this property (ordinal 100)
#
# Value is replaced by Maven from config.properties
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:${keycloak.client.secret}}

# ============================================================================
# Additional Application Configuration
# ============================================================================
# Add other application-specific configuration properties here as needed

# ============================================================================
# MicroProfile JWT - Groups/Roles Configuration
# ============================================================================
# NOTE: MicroProfile JWT 2.1 expects roles in the 'groups' claim by default.
#
# Keycloak by default writes roles to 'realm_access.roles', not 'groups'.
# The configuration property 'mp.jwt.claim.groups=realm_access/roles' does NOT work
# because MicroProfile JWT doesn't support nested claim path notation.
#
# SOLUTION: Configure Keycloak protocol mappers to add roles to the 'groups' claim.
# See: KEYCLOAK-GROUPS-CLAIM-SOLUTION.md in the project root for instructions.
#
# With the Keycloak mapper configured, Liberty automatically reads roles from
# the 'groups' claim and no additional configuration is needed here.

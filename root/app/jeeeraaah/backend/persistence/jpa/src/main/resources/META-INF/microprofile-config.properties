# ============================================================================
# MicroProfile Config for jeeeraaah Backend Persistence (JPA)
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# Maven replaces ${db.xxx} with actual values during build
# Fallback values (after colon) are used if Maven filtering doesn't work
# See: config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection for JPA/Hibernate
# Maven resource filtering replaces these placeholders with values from config.properties
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbhost=${db.host:localhost}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbport=${db.port:5432}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbname=${db.database:app_jeeeraaah}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbuser=${db.username:r_uu}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbpass=${db.password:r_uu_password}

# Persistence unit (pu) name
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=app_jeeeraaah_test

# REST API Configuration
jeeeraaah.rest-api.host=${rest.api.host:localhost}
jeeeraaah.rest-api.port=${rest.api.port:9080}


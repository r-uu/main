# ============================================================================
# MicroProfile Config for jeeeraaah Backend Persistence (JPA)
# ============================================================================
# Reads environment variables directly at runtime (no Maven filtering)
# Environment variables are set by:
#   - Docker: from .env file in config/shared/docker/
#   - Local: from system environment or IDE run configuration
# Format: ${ENV_VAR_NAME:fallback-value}
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection for JPA/Hibernate - Production uses jeeeraaah database
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbhost=${POSTGRES_JEEERAAAH_HOST:localhost}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbport=${POSTGRES_JEEERAAAH_PORT:5432}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbname=${POSTGRES_JEEERAAAH_DATABASE:jeeeraaah}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbuser=${POSTGRES_JEEERAAAH_USER:jeeeraaah}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbpass=${POSTGRES_JEEERAAAH_PASSWORD:jeeeraaah}

# Persistence unit (pu) name
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=app_jeeeraaah_test

# REST API Configuration
jeeeraaah.rest-api.host=${rest.api.host:localhost}
jeeeraaah.rest-api.port=${rest.api.port:9080}


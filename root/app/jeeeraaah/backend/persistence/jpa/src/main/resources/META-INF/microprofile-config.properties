# ============================================================================
# MicroProfile Config for jeeeraaah Backend Persistence (JPA)
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection for JPA/Hibernate
# Direct values (can be overridden via system properties or environment variables)
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbhost=localhost
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbport=5432
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbname=app_jeeeraaah
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbuser=app_jeeeraaah
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbpass=app_jeeeraaah

# Persistence unit (pu) name
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=app_jeeeraaah_test

# REST API Configuration (for testing)
jeeeraaah.rest-api.host=localhost
jeeeraaah.rest-api.port=9080


# ============================================================================
# MicroProfile Config for jeeeraaah Backend Persistence (JPA)
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection for JPA/Hibernate
# These values are replaced by Maven during build from config.properties
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbhost=${db.host}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbport=${db.port}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbname=${db.name}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbuser=${db.user}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbpass=${db.password}

# Persistence unit (pu) name
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=app_jeeeraaah_test

# REST API Configuration (for testing)
jeeeraaah.rest-api.host=${rest.api.host}
jeeeraaah.rest-api.port=${rest.api.port}


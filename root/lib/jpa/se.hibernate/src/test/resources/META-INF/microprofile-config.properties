# ============================================================================
# MicroProfile Config for JPA Hibernate SE Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# Maven replaces ${db.xxx} with actual values during build
# Fallback values (after colon) are used if Maven filtering doesn't work
# See: config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection
database.host=${db.host:localhost}
database.port=${db.port:5432}
database.name=${db.database:lib_test}
database.user=${db.username:r_uu}
database.pass=${db.password:r_uu_password}


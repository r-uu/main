# ============================================================================
# MicroProfile Config for JPA Hibernate PostgreSQL Demo Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# Maven replaces ${db.xxx} with actual values during build
# Fallback values (after colon) are used if Maven filtering doesn't work
# See: config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# For DisabledOnServerNotListening - Database connection check
database.host=${POSTGRES_JEEERAAAH_HOST:localhost}
database.port=${POSTGRES_JEEERAAAH_PORT:5432}

# For AbstractEntityManagerProducer (module-specific keys) - uses lib_test database
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbhost=${POSTGRES_JEEERAAAH_HOST:localhost}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbport=${POSTGRES_JEEERAAAH_PORT:5432}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbname=${POSTGRES_LIB_TEST_DATABASE:lib_test}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbuser=${POSTGRES_LIB_TEST_USER:lib_test}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.dbpass=${POSTGRES_LIB_TEST_PASSWORD:lib_test}
de.ruu.lib.jpa.se.hibernate.postgres.AbstractEntityManagerProducer.puname=lib_test


# ============================================================================
# MicroProfile Config for JDBC PostgreSQL Library Tests
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

config_ordinal=100

# PostgreSQL Database Connection
# These values are replaced by Maven during build from config.properties
# Align with Docker .env (APP_DB, APP_ROLE, APP_ROLE_PASSWORD)
database.host=${db.host}
database.port=${db.port}
database.name=${db.name}
database.user=${db.user}
database.pass=${db.password}


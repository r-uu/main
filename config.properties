# ================================================================================
# Local Development Configuration
# ================================================================================
# This file contains machine-specific configuration properties.
# Properties are automatically loaded from config/shared/docker/.env
# via properties-maven-plugin (see bom/pom.xml profile 'load-env')
# ================================================================================
# SINGLE POINT OF TRUTH: config/shared/docker/.env
# ================================================================================
# IMPORTANT: This file is NOT under Git control (.gitignore)
# ================================================================================

# PostgreSQL Database Configuration (JEEERAaH)
# Values come from postgres_jeeeraaah_* in .env
db.host=localhost
db.port=5432
db.database=${postgres_jeeeraaah_database}
db.username=${postgres_jeeeraaah_username}
db.password=${postgres_jeeeraaah_password}

# PostgreSQL Database Configuration (lib_test - for integration tests)
# Values come from postgres_libtest_* in .env
db.libtest.host=localhost
db.libtest.port=5432
db.libtest.database=${postgres_libtest_database}
db.libtest.username=${postgres_libtest_username}
db.libtest.password=${postgres_libtest_password}

# Backup/Restore Configuration
db.backup.host=${db.host}
db.backup.port=${db.port}
db.backup.database=${db.database}
db.backup.username=${db.username}
db.backup.password=${db.password}
db.backup.directory=/tmp/db-backup
db.backup.executable=/usr/bin/pg_dump

db.restore.host=${db.host}
db.restore.port=${db.port}
db.restore.database=${db.database}
db.restore.username=${db.username}
db.restore.password=${db.password}
db.restore.executable=/usr/bin/pg_restore

# REST API Configuration
rest.api.host=localhost
rest.api.port=9080

# Keycloak Configuration
# Values come from keycloak_* in .env
keycloak.host=localhost
keycloak.port=8080
keycloak.realm=jeeeraaah-realm
keycloak.client.id=jeeeraaah-frontend
keycloak.admin.username=${keycloak_admin_username}
keycloak.admin.password=${keycloak_admin_password}

# Open Liberty Server Configuration
liberty.datasource.server.host=${db.host}
liberty.datasource.server.port=${db.port}
liberty.datasource.database=${db.database}
liberty.datasource.username=${db.username}
liberty.datasource.password=${db.password}

# ================================================================================
# Integration Test Database (lib_test)
# ================================================================================
database.host=localhost
database.port=5432
database.name=lib_test
database.user=lib_test
database.password=lib_test
